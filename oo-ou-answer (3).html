<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>○○王 回答フォーム</title>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Kaisei+Decol:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5e6c8;
  --paper: #fdf6e3;
  --red: #c0141a;
  --red2: #8b0000;
  --navy: #0a1a3a;
  --gold: #c8960c;
  --gold2: #f0c040;
  --ink: #1a0a00;
  --dim: #8a6a40;
  --team-a: #c0141a; --team-b: #0a4a8a; --team-c: #1a6a1a;
  --team-d: #8a4a00; --team-e: #6a0a6a; --team-f: #0a6a6a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  font-family: 'DotGothic16', monospace;
  min-height: 100vh;
  padding: 0;
  color: var(--ink);
}

/* ── HEADER ── */
.header {
  background: var(--navy);
  border-bottom: 4px solid var(--gold);
  padding: 16px 20px;
  text-align: center;
}
.header-title {
  font-family: 'Kaisei Decol', serif;
  font-size: 28px; color: var(--gold2);
  text-shadow: 2px 2px 0 rgba(0,0,0,0.5);
  letter-spacing: 0.1em;
}
.header-sub { font-size: 11px; color: var(--dim); margin-top: 4px; letter-spacing: 0.15em; }

/* ── CURRENT Q DISPLAY ── */
.current-q-box {
  background: var(--red2);
  padding: 20px;
  text-align: center;
  border-bottom: 3px solid var(--ink);
}
.cq-label { font-size: 11px; color: rgba(255,255,255,0.6); letter-spacing: 0.2em; margin-bottom: 6px; }
.cq-num {
  font-family: 'Kaisei Decol', serif;
  font-size: 20px; color: #fff; font-weight: 700;
  margin-bottom: 8px;
}
.cq-question {
  font-family: 'Kaisei Decol', serif;
  font-size: 22px; color: var(--gold2);
  line-height: 1.4; font-weight: 700;
}
.cq-waiting {
  font-size: 14px; color: rgba(255,255,255,0.5);
  letter-spacing: 0.15em;
  animation: blink 1.2s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* ── FORM ── */
.form-wrap {
  padding: 24px 20px;
  max-width: 480px; margin: 0 auto;
  display: flex; flex-direction: column; gap: 20px;
}

.form-group { display: flex; flex-direction: column; gap: 8px; }
.form-label {
  font-size: 11px; letter-spacing: 0.2em; color: var(--dim); font-weight: 700;
}

/* チーム選択 */
.team-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
}
.team-opt {
  border: 3px solid; padding: 10px 6px;
  text-align: center; cursor: pointer;
  font-family: 'DotGothic16', monospace;
  font-size: 13px; font-weight: 900;
  background: var(--paper);
  transition: all 0.15s;
  box-shadow: 3px 3px 0 rgba(0,0,0,0.2);
  -webkit-tap-highlight-color: transparent;
}
.team-opt:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 rgba(0,0,0,0.2); }
.team-opt.selected { color: #fff !important; transform: translate(2px,2px); box-shadow: 1px 1px 0 rgba(0,0,0,0.2); }
.opt-a { color: var(--team-a); border-color: var(--team-a); }
.opt-a.selected { background: var(--team-a); }
.opt-b { color: var(--team-b); border-color: var(--team-b); }
.opt-b.selected { background: var(--team-b); }
.opt-c { color: var(--team-c); border-color: var(--team-c); }
.opt-c.selected { background: var(--team-c); }
.opt-d { color: var(--team-d); border-color: var(--team-d); }
.opt-d.selected { background: var(--team-d); }
.opt-e { color: var(--team-e); border-color: var(--team-e); }
.opt-e.selected { background: var(--team-e); }
.opt-f { color: var(--team-f); border-color: var(--team-f); }
.opt-f.selected { background: var(--team-f); }

/* 名前・回答入力 */
.text-input {
  width: 100%;
  background: var(--paper);
  border: 3px solid var(--ink);
  padding: 12px 14px;
  font-family: 'DotGothic16', monospace;
  font-size: 16px; color: var(--ink);
  box-shadow: 3px 3px 0 rgba(0,0,0,0.2);
  outline: none;
  -webkit-appearance: none;
}
.text-input:focus { border-color: var(--red2); box-shadow: 3px 3px 0 var(--red2); }

/* 送信ボタン */
.submit-btn {
  background: var(--red2);
  border: 3px solid var(--ink);
  color: #fff;
  padding: 16px;
  font-family: 'Kaisei Decol', serif;
  font-size: 20px; font-weight: 700;
  cursor: pointer; letter-spacing: 0.1em;
  box-shadow: 4px 4px 0 var(--ink);
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.submit-btn:active { transform: translate(3px,3px); box-shadow: 1px 1px 0 var(--ink); }
.submit-btn:disabled { background: var(--dim); cursor: not-allowed; }

/* 送信済み */
.sent-box {
  text-align: center; padding: 40px 20px;
  display: none;
}
.sent-box.show { display: block; }
.sent-icon { font-size: 64px; margin-bottom: 16px; }
.sent-title {
  font-family: 'Kaisei Decol', serif;
  font-size: 28px; color: var(--red2); font-weight: 700;
  text-shadow: 2px 2px 0 var(--gold2);
  margin-bottom: 8px;
}
.sent-sub { font-size: 13px; color: var(--dim); }
.sent-again {
  margin-top: 24px;
  background: var(--navy); border: 3px solid var(--gold);
  color: var(--gold2); padding: 12px 24px;
  font-family: 'DotGothic16', monospace; font-size: 14px;
  cursor: pointer; letter-spacing: 0.1em;
}

/* 他チームの回答 */
.others-box {
  padding: 0 20px 24px;
  max-width: 480px; margin: 0 auto;
}
.others-title {
  font-size: 11px; letter-spacing: 0.2em; color: var(--dim);
  margin-bottom: 10px; border-bottom: 1px solid var(--dim); padding-bottom: 6px;
}
.others-list { display: flex; flex-direction: column; gap: 6px; }
.other-chip {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; border: 2px solid;
  font-size: 14px; font-weight: 700;
  background: var(--paper);
}
.other-chip-team { font-size: 10px; opacity: 0.8; min-width: 50px; }
.other-chip-ans  { flex: 1; }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">👑 ○○王 回答フォーム</div>
  <div class="header-sub">━━ 2025 送別会スペシャル ━━</div>
</div>

<div class="current-q-box" id="current-q-box">
  <div class="cq-label">◆ 現在の問題 ◆</div>
  <div class="cq-num" id="cq-num" style="display:none"></div>
  <div class="cq-question" id="cq-question" style="display:none"></div>
  <div class="cq-waiting" id="cq-waiting">⏳ 問題の開始をお待ちください...</div>
  <div id="status-indicator" style="font-size:11px;color:rgba(255,255,255,0.5);margin-top:6px">接続中...</div>
  <div id="status-badge" style="font-size:12px;margin-top:8px;color:var(--dim)">━ 待機中 ━</div>
</div>

<div class="form-wrap" id="form-wrap">
  <div class="form-group">
    <div class="form-label">▼ あなたのチームを選んでください</div>
    <div class="team-grid" id="team-grid">
      <div class="team-opt opt-a" onclick="selectTeam('a')">Aチーム</div>
      <div class="team-opt opt-b" onclick="selectTeam('b')">Bチーム</div>
      <div class="team-opt opt-c" onclick="selectTeam('c')">Cチーム</div>
      <div class="team-opt opt-d" onclick="selectTeam('d')">Dチーム</div>
      <div class="team-opt opt-e" onclick="selectTeam('e')">Eチーム</div>
      <div class="team-opt opt-f" onclick="selectTeam('f')">Fチーム</div>
    </div>
  </div>

  <div class="form-group">
    <div class="form-label">▼ お名前（任意）</div>
    <input class="text-input" type="text" id="name-input" placeholder="例：田中">
  </div>

  <div class="form-group">
    <div class="form-label">▼ あなたの回答を入力してください</div>
    <input class="text-input" type="text" id="answer-input" placeholder="回答を入力..." maxlength="40">
  </div>

  <button class="submit-btn" id="submit-btn" onclick="submitAnswer()">回 答 す る ▶</button>
</div>

<div class="sent-box" id="sent-box">
  <div class="sent-icon">✅</div>
  <div class="sent-title">回答しました！</div>
  <div class="sent-sub">MCの正解発表をお待ちください</div>
  <button class="sent-again" onclick="resetForm()">▶ もう一度回答する</button>
</div>

<div class="others-box">
  <div class="others-title">▶ 各チームの回答</div>
  <div class="others-list" id="others-list">
    <span style="color:var(--dim);font-size:12px">まだ回答なし</span>
  </div>
</div>

<!-- Firebase compat (no module, works on all mobile browsers) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyCVYoPcmJYISStsKBUZ4rnSOYaylrhYEos",
  authDomain: "farewell-party2025.firebaseapp.com",
  databaseURL: "https://farewell-party2025-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "farewell-party2025",
  storageBucket: "farewell-party2025.firebasestorage.app",
  messagingSenderId: "687831204742",
  appId: "1:687831204742:web:b1674584e2bc639193e207"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const TEAM_COLORS = {
  a:'#c0141a', b:'#0a4a8a', c:'#1a6a1a', d:'#8a4a00', e:'#6a0a6a', f:'#0a6a6a'
};
const TEAM_NAMES = { a:'Aチーム', b:'Bチーム', c:'Cチーム', d:'Dチーム', e:'Eチーム', f:'Fチーム' };

let selectedTeam = null;
let currentQIndex = null;
let isOpen = false;

// チーム選択
function selectTeam(id) {
  selectedTeam = id;
  document.querySelectorAll('.team-opt').forEach(el => el.classList.remove('selected'));
  document.querySelector('.opt-' + id).classList.add('selected');
  try { localStorage.setItem('oo_my_team', id); } catch(e) {}
}
window.selectTeam = selectTeam;

// 前回チームを復元
try {
  const saved = localStorage.getItem('oo_my_team');
  if (saved) selectTeam(saved);
} catch(e) {}

// ステータス監視
db.ref('status').on('value', (snap) => {
  isOpen = snap.val() === 'open';
  const btn = document.getElementById('submit-btn');
  if (btn && !btn.disabled) {
    btn.textContent = isOpen ? '回 答 す る ▶' : '━ 受付終了 ━';
    btn.style.background = isOpen ? 'var(--red2)' : 'var(--dim)';
  }
  const badge = document.getElementById('status-badge');
  if (badge) {
    badge.textContent = isOpen ? '✅ 受付中' : '⏹ 締め切り';
    badge.style.color = isOpen ? '#4caf50' : '#e84a5f';
  }
});

// 現在の問題監視
db.ref('currentQ').on('value', (snap) => {
  try {
    const data = snap.val();
    const indicator = document.getElementById('status-indicator');
    if (indicator) indicator.textContent = 'Firebase接続OK ✓';

    if (!data) {
      document.getElementById('cq-num').style.display = 'none';
      document.getElementById('cq-question').style.display = 'none';
      document.getElementById('cq-waiting').style.display = 'block';
      currentQIndex = null;
      return;
    }

    let idx, targetDisplay, questionText;
    if (typeof data === 'object') {
      idx           = data.index;
      targetDisplay = data.targetDisplay || data.target || '';
      questionText  = data.question || '';
    } else {
      idx = Number(data);
      targetDisplay = 'Q' + (idx + 1);
      questionText  = '';
    }

    currentQIndex = idx;
    document.getElementById('cq-num').textContent      = '第' + (idx+1) + '問 ━ ' + targetDisplay + '王 決定戦';
    document.getElementById('cq-question').textContent = questionText;
    document.getElementById('cq-num').style.display      = 'block';
    document.getElementById('cq-question').style.display = 'block';
    document.getElementById('cq-waiting').style.display  = 'none';
    resetForm();
  } catch(e) {
    console.error('currentQ error', e);
  }
});

// 他チームの回答監視
db.ref('answers').on('value', (snap) => {
  const data = snap.val() || {};
  const list = document.getElementById('others-list');
  const entries = Object.values(data);
  if (entries.length === 0) {
    list.innerHTML = '<span style="color:var(--dim);font-size:12px">まだ回答なし</span>';
    return;
  }
  list.innerHTML = entries.map(e => {
    const color = TEAM_COLORS[e.teamId] || '#888';
    const name  = TEAM_NAMES[e.teamId]  || e.teamId;
    return '<div class="other-chip" style="border-color:' + color + ';color:' + color + '">'
      + '<span class="other-chip-team">' + name + '</span>'
      + '<span class="other-chip-ans">'  + e.answer + '</span>'
      + '</div>';
  }).join('');
});

// 回答送信
function submitAnswer() {
  const answer = document.getElementById('answer-input').value.trim();
  const name   = document.getElementById('name-input').value.trim();
  if (!selectedTeam)      { alert('チームを選んでください'); return; }
  if (!answer)            { alert('回答を入力してください'); return; }
  if (currentQIndex === null) { alert('まだ問題が始まっていません'); return; }
  if (!isOpen)            { alert('回答受付は締め切られました'); return; }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = '送信中...';

  db.ref('answers').push({
    teamId: selectedTeam,
    name:   name || '匿名',
    answer: answer,
    qIndex: currentQIndex,
    ts:     Date.now(),
  }).then(() => {
    document.getElementById('form-wrap').style.display = 'none';
    document.getElementById('sent-box').classList.add('show');
  }).catch(err => {
    alert('送信に失敗しました: ' + err.message);
    btn.disabled = false;
    btn.textContent = '回 答 す る ▶';
  });
}
window.submitAnswer = submitAnswer;

function resetForm() {
  document.getElementById('answer-input').value = '';
  document.getElementById('form-wrap').style.display = 'flex';
  document.getElementById('sent-box').classList.remove('show');
  const btn = document.getElementById('submit-btn');
  btn.disabled = false;
  btn.textContent = isOpen ? '回 答 す る ▶' : '━ 受付終了 ━';
}
window.resetForm = resetForm;
</script>
</body>
</html>
